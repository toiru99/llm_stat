<style>
  :root{
    --ground:#EAEEF2; --panel:#FFFFFF; --ink:#16222E; --muted:#5C6B77;
    --line:#D2DAE1; --line-soft:#E4E9ee;
    --signal:#1F6FEB; --signal-soft:rgba(31,111,235,.14);
    --amber:#E8833A; --amber-soft:rgba(232,131,58,.16);
    --violet:#7C5CFF;
    --base:#9AA7B2;
    --good:#1F8F6b; --warn:#C26A2E;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --series-0:#1F6FEB; --series-1:#E8833A; --series-2:#7C5CFF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1320px;margin:0 auto;padding:22px clamp(14px,3vw,30px) 60px}

  /* header */
  header.top{display:flex;justify-content:space-between;align-items:flex-end;
    gap:20px;flex-wrap:wrap;border-bottom:1.5px solid var(--ink);padding-bottom:14px;margin-bottom:20px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--muted);margin:0 0 6px}
  h1{font-size:clamp(22px,3.2vw,34px);font-weight:760;letter-spacing:-.02em;margin:0;line-height:1.05}
  h1 .dim{color:var(--muted);font-weight:560}
  .meta{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;letter-spacing:.04em}
  .meta a{color:var(--signal);text-decoration:none;border-bottom:1px solid transparent}
  .meta a:hover{border-color:var(--signal)}

  /* layout */
  .grid{display:grid;grid-template-columns:248px minmax(0,1fr) 320px;gap:18px;align-items:start}
  @media(max-width:1080px){.grid{grid-template-columns:220px minmax(0,1fr)}.panel{grid-column:1/-1}}
  @media(max-width:760px){.grid{grid-template-columns:1fr}.rail{order:2}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .rail{position:sticky;top:14px;display:flex;flex-direction:column;gap:14px}
  @media(max-width:760px){.rail{position:static}}

  .sect-h{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);padding:12px 14px 8px;border-bottom:1px solid var(--line-soft)}

  /* search + filters */
  .search{width:100%;border:none;border-bottom:1px solid var(--line);background:transparent;
    padding:10px 14px;font-family:var(--mono);font-size:13px;color:var(--ink);outline:none}
  .search::placeholder{color:var(--muted)}
  .search:focus{border-color:var(--signal)}
  .filters{padding:12px 14px;display:flex;flex-direction:column;gap:12px}
  .filter-grp{display:flex;flex-direction:column;gap:6px}
  .filter-grp > span{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-family:var(--mono);font-size:11px;padding:3px 8px;border:1px solid var(--line);
    border-radius:20px;cursor:pointer;color:var(--muted);user-select:none}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .rng{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .rng input{flex:1}
  input[type=range]{accent-color:var(--signal)}

  /* model list */
  .list{max-height:560px;overflow:auto}
  .mrow{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft);
    border-left:3px solid transparent}
  .mrow:hover{background:#F4F7FA}
  .mrow[aria-selected="true"]{background:var(--signal-soft);border-left-color:var(--signal)}
  .mrow.cmp{border-left-style:dashed}
  .mrow .nm{flex:1;min-width:0;font-size:12.5px;font-weight:560;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mrow .ix{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .mrow .dot{width:8px;height:8px;border-radius:2px;flex:none}
  .listcount{font-family:var(--mono);font-size:10px;color:var(--muted);padding:7px 14px;border-top:1px solid var(--line-soft)}

  /* stage */
  .stage{display:flex;flex-direction:column;gap:14px;min-width:0}
  .tabs{display:flex;gap:2px;padding:8px 8px 0}
  .tab{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    padding:8px 14px;border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;
    background:#F1F4F7;color:var(--muted);cursor:pointer;margin-bottom:-1px}
  .tab[aria-selected="true"]{background:var(--panel);color:var(--ink);border-color:var(--line);font-weight:600}
  .view{padding:8px 8px 16px}
  .view-wrap{position:relative}
  svg{display:block;width:100%;height:auto}
  text{font-family:var(--mono)}

  .legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;font-family:var(--mono);font-size:11px;padding:4px 10px 10px}
  .legend .it{display:flex;align-items:center;gap:6px;color:var(--ink)}
  .legend .sw{width:12px;height:3px;border-radius:2px}
  .hint{font-family:var(--mono);font-size:10.5px;color:var(--muted);text-align:center;padding:0 10px 6px}

  /* right panel */
  .panel{display:flex;flex-direction:column;gap:14px;position:sticky;top:14px}
  @media(max-width:1080px){.panel{position:static}}
  .ph{padding:14px}
  .ph .creator{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .ph h2{margin:3px 0 0;font-size:19px;font-weight:740;letter-spacing:-.01em}
  .badges{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);
    border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);margin-top:12px}
  .badge{background:var(--panel);padding:9px 14px}
  .badge .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .badge .v{font-family:var(--mono);font-size:15px;font-weight:600;margin-top:1px}
  .badge .v small{font-size:10px;color:var(--muted);font-weight:400}

  .empty{padding:30px 16px;text-align:center;color:var(--muted);font-family:var(--mono);font-size:12px}

  .foot{margin-top:26px;font-family:var(--mono);font-size:10.5px;color:var(--muted);
    border-top:1px solid var(--line);padding-top:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="wrap">
  <header class="top">
    <div>
      <p class="eyebrow">Alan · LLM capability instrument</p>
      <h1>LLM 능력 레이더 <span class="dim">— 평균 대비 강·약점</span></h1>
    </div>
    <div class="meta" id="meta"></div>
  </header>

  <div class="grid">
    <!-- LEFT RAIL -->
    <aside class="rail">
      <div class="card">
        <input class="search" id="search" placeholder="모델 검색…" autocomplete="off">
        <div class="filters" id="filters"></div>
      </div>
      <div class="card">
        <div class="sect-h">모델 <span id="cmpnote" style="text-transform:none;letter-spacing:0"></span></div>
        <div class="list" id="list"></div>
        <div class="listcount" id="listcount"></div>
      </div>
    </aside>

    <!-- STAGE -->
    <section class="stage card">
      <div class="tabs">
        <button class="tab" data-view="radar" aria-selected="true">레이더</button>
        <button class="tab" data-view="scatter" aria-selected="false">가성비</button>
      </div>
      <div class="view">
        <div class="view-wrap" id="viewwrap"></div>
        <div class="legend" id="legend"></div>
        <div class="hint" id="hint"></div>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <aside class="panel card" id="panel"></aside>
  </div>

  <div class="foot">
    <span>출처: <a href="https://artificialanalysis.ai/leaderboards/models" target="_blank" rel="noopener" style="color:var(--signal)">artificialanalysis.ai</a> · 8축 = 평균 50 기준선(z-score) · 추정/미측정 구분 표기</span>
    <span id="footdate"></span>
  </div>
</div>

<script>
const PAYLOAD = __CARDS__;
const AX = PAYLOAD.axes, LAB = PAYLOAD.labels, MODELS = PAYLOAD.models;

const $=s=>document.querySelector(s), el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const fmtCtx=n=>!n?"—":n>=1e6?(n/1e6)+"M":Math.round(n/1e3)+"k";
const SERIES=["--series-0","--series-1","--series-2"];

let state={view:"radar",selected:[MODELS[0].slug],q:"",creators:new Set(),lic:new Set(),maxPrice:Infinity,minCtx:0};

// ---------- filters ----------
function buildFilters(){
  const f=$("#filters");
  const creators=[...new Set(MODELS.map(m=>m.creator))].sort();
  const lics=[...new Set(MODELS.map(m=>m.license).filter(Boolean))];
  const maxP=Math.ceil(Math.max(...MODELS.map(m=>m.price||0)));
  f.innerHTML="";
  const cg=el("div","filter-grp");cg.innerHTML="<span>제작사</span>";
  const cc=el("div","chips");
  creators.forEach(c=>{const b=el("span","chip");b.textContent=c;b.setAttribute("aria-pressed","false");
    b.onclick=()=>{b.getAttribute("aria-pressed")==="true"?(state.creators.delete(c),b.setAttribute("aria-pressed","false")):(state.creators.add(c),b.setAttribute("aria-pressed","true"));render();};cc.appendChild(b);});
  cg.appendChild(cc);f.appendChild(cg);
  const lg=el("div","filter-grp");lg.innerHTML="<span>라이선스</span>";
  const lc=el("div","chips");
  lics.forEach(c=>{const b=el("span","chip");b.textContent=c==="Open"?"오픈":c==="Proprietary"?"독점":c;b.setAttribute("aria-pressed","false");
    b.onclick=()=>{b.getAttribute("aria-pressed")==="true"?(state.lic.delete(c),b.setAttribute("aria-pressed","false")):(state.lic.add(c),b.setAttribute("aria-pressed","true"));render();};lc.appendChild(b);});
  lg.appendChild(lc);f.appendChild(lg);
  const pg=el("div","filter-grp");pg.innerHTML="<span>최대 가격 ($/1M)</span>";
  const pr=el("div","rng");const pi=el("input");pi.type="range";pi.min=0;pi.max=maxP;pi.value=maxP;pi.step=0.5;
  const pv=el("span");pv.textContent="≤$"+maxP;
  pi.oninput=()=>{state.maxPrice=+pi.value>=maxP?Infinity:+pi.value;pv.textContent=state.maxPrice===Infinity?"전체":"≤$"+(+pi.value);render();};
  pr.append(pi,pv);pg.appendChild(pr);f.appendChild(pg);
}

function filtered(){
  return MODELS.filter(m=>{
    if(state.q && !m.name.toLowerCase().includes(state.q)) return false;
    if(state.creators.size && !state.creators.has(m.creator)) return false;
    if(state.lic.size && !state.lic.has(m.license)) return false;
    if(m.price!=null && m.price>state.maxPrice) return false;
    return true;
  });
}

// ---------- model list ----------
function buildList(){
  const list=$("#list"), rows=filtered();
  list.innerHTML="";
  rows.forEach(m=>{
    const r=el("div","mrow");
    const si=state.selected.indexOf(m.slug);
    r.setAttribute("aria-selected", si>=0);
    if(si>0)r.classList.add("cmp");
    const dot=el("span","dot");dot.style.background= si>=0?`var(${SERIES[si]})`:"transparent";
    const nm=el("span","nm");nm.textContent=m.name;
    const ix=el("span","ix");ix.textContent=m.intel==null?"—":m.intel;
    r.append(dot,nm,ix);
    r.onclick=(e)=>toggleSelect(m.slug,e.metaKey||e.ctrlKey||e.shiftKey);
    list.appendChild(r);
  });
  $("#listcount").textContent=rows.length+" / "+MODELS.length+" 모델";
  $("#cmpnote").textContent = state.selected.length>1 ? `· 비교 ${state.selected.length}/3` : "· ⌘+클릭으로 비교";
}
function toggleSelect(slug,multi){
  if(multi){
    const i=state.selected.indexOf(slug);
    if(i>=0){ if(state.selected.length>1) state.selected.splice(i,1); }
    else if(state.selected.length<3) state.selected.push(slug);
  } else state.selected=[slug];
  render();
}

// ---------- radar ----------
function radarSVG(){
  const S=460,cx=S/2,cy=S/2+6,R=158,n=AX.length;
  const ang=i=>-Math.PI/2 + i*2*Math.PI/n;
  const pt=(i,rad)=>[cx+Math.cos(ang(i))*rad*(R/100), cy+Math.sin(ang(i))*rad*(R/100)];
  let g=`<svg viewBox="0 0 ${S} ${S+20}" role="img" aria-label="능력 레이더">`;
  // rings
  [25,50,75,100].forEach(rr=>{
    const pts=AX.map((_,i)=>pt(i,rr).join(",")).join(" ");
    const base=rr===50;
    g+=`<polygon points="${pts}" fill="none" stroke="${base?'var(--base)':'var(--line)'}" stroke-width="${base?1.4:1}" ${base?'stroke-dasharray="2 3"':''}/>`;
  });
  // spokes + labels
  AX.forEach((ax,i)=>{
    const [x,y]=pt(i,100);
    g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;
    const [lx,ly]=pt(i,118);
    const anchor=Math.abs(lx-cx)<6?"middle":lx>cx?"start":"end";
    g+=`<text x="${lx}" y="${ly+3}" text-anchor="${anchor}" font-size="11" font-weight="600" fill="var(--ink)">${LAB[ax]}</text>`;
  });
  g+=`<text x="${cx}" y="${pt(4,50)[1]-4}" text-anchor="middle" font-size="9" fill="var(--base)">평균</text>`;
  // model polygons
  state.selected.forEach((slug,si)=>{
    const m=MODELS.find(x=>x.slug===slug);if(!m)return;
    const col=`var(${SERIES[si]})`;
    const verts=AX.map((ax,i)=>{const d=m.radar[ax];const rad=d.measured?d.r:50;return {i,rad,d,xy:pt(i,rad)};});
    const poly=verts.map(v=>v.xy.join(",")).join(" ");
    g+=`<polygon class="trace" points="${poly}" fill="${si===0?'var(--signal-soft)':'none'}" stroke="${col}" stroke-width="2" stroke-linejoin="round" style="--i:${si}"/>`;
    verts.forEach(v=>{
      if(v.d.measured){
        const above=v.d.r>=50;
        g+=`<circle cx="${v.xy[0]}" cy="${v.xy[1]}" r="3.2" fill="${col}"><title>${LAB[AX[v.i]]}: r ${v.d.r} (z ${v.d.z>=0?'+':''}${v.d.z})</title></circle>`;
      } else {
        g+=`<circle cx="${v.xy[0]}" cy="${v.xy[1]}" r="3.4" fill="var(--ground)" stroke="var(--base)" stroke-width="1.2" stroke-dasharray="2 2"><title>${LAB[AX[v.i]]}: 측정 안 됨</title></circle>`;
      }
    });
  });
  g+=`</svg>`;
  return g;
}

// ---------- scatter (가성비) ----------
function scatterSVG(){
  const W=560,H=420,m={l:54,r:18,t:18,b:46};
  const rows=filtered().filter(d=>d.price!=null&&d.intel!=null&&d.price>0);
  const xs=rows.map(d=>Math.log10(d.price)), ys=rows.map(d=>d.intel);
  const xmin=Math.min(...xs,Math.log10(0.1)),xmax=Math.max(...xs,Math.log10(30));
  const ymin=0,ymax=Math.max(...ys,60);
  const X=v=>m.l+(Math.log10(v)-xmin)/(xmax-xmin)*(W-m.l-m.r);
  const Y=v=>H-m.b-(v-ymin)/(ymax-ymin)*(H-m.t-m.b);
  let g=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="가성비 산점도">`;
  g+=`<line x1="${m.l}" y1="${H-m.b}" x2="${W-m.r}" y2="${H-m.b}" stroke="var(--ink)" stroke-width="1.2"/>`;
  g+=`<line x1="${m.l}" y1="${m.t}" x2="${m.l}" y2="${H-m.b}" stroke="var(--ink)" stroke-width="1.2"/>`;
  [0.1,0.5,1,3,10,30].forEach(p=>{const x=X(p);g+=`<line x1="${x}" y1="${m.t}" x2="${x}" y2="${H-m.b}" stroke="var(--line-soft)"/><text x="${x}" y="${H-m.b+16}" text-anchor="middle" font-size="9" fill="var(--muted)">$${p}</text>`;});
  [0,20,40,60].forEach(v=>{const y=Y(v);g+=`<line x1="${m.l}" y1="${y}" x2="${W-m.r}" y2="${y}" stroke="var(--line-soft)"/><text x="${m.l-7}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--muted)">${v}</text>`;});
  g+=`<text x="${(W-m.r+m.l)/2}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--muted)">가격 $/1M (로그) →</text>`;
  g+=`<text transform="translate(13 ${(m.t+H-m.b)/2}) rotate(-90)" text-anchor="middle" font-size="10" fill="var(--muted)">종합지능</text>`;
  g+=`<text x="${m.l+6}" y="${m.t+12}" font-size="9" fill="var(--good)">◀ 가성비 우수 (싸고 똑똑)</text>`;
  rows.forEach(d=>{
    const sel=state.selected.includes(d.slug);
    g+=`<circle cx="${X(d.price)}" cy="${Y(d.intel)}" r="${sel?6:4}" fill="${sel?'var(--signal)':'rgba(92,107,119,.5)'}" stroke="${sel?'#fff':'none'}" stroke-width="1.5" style="cursor:pointer" data-slug="${d.slug}"><title>${d.name} · 지능 ${d.intel} · $${d.price} · 가성비 ${d.value??'—'}</title></circle>`;
  });
  g+=`</svg>`;
  return g;
}

// ---------- right panel ----------
function panelHTML(){
  const p=$("#panel");
  const m=MODELS.find(x=>x.slug===state.selected[0]);
  if(!m){p.innerHTML='<div class="empty">모델을 선택하세요</div>';return;}
  p.innerHTML=`
    <div class="ph">
      <div class="creator">${m.creator} · ${m.license==='Open'?'오픈':m.license==='Proprietary'?'독점':m.license||''}</div>
      <h2>${m.name}</h2>
      <div class="badges">
        <div class="badge"><div class="k">종합지능</div><div class="v">${m.intel??'—'}</div></div>
        <div class="badge"><div class="k">가성비 (지능÷혼합$)</div><div class="v">${m.value??'—'}</div></div>
        <div class="badge"><div class="k">입력가</div><div class="v">$${m.price_in??'—'}<small>/1M</small></div></div>
        <div class="badge"><div class="k">출력가</div><div class="v">$${m.price_out??'—'}<small>/1M</small></div></div>
        <div class="badge"><div class="k">혼합가 (3:1)</div><div class="v">$${m.price??'—'}<small>/1M</small></div></div>
        <div class="badge"><div class="k">컨텍스트</div><div class="v">${fmtCtx(m.ctx)}</div></div>
        <div class="badge"><div class="k">속도</div><div class="v">${m.speed??'—'}<small> t/s</small></div></div>
        <div class="badge" title="첫 토큰까지 지연. 추론 모델은 사고시간 포함이라 큼"><div class="k">TTFT</div><div class="v">${m.ttft??'—'}<small> s</small></div></div>
        <div class="badge"><div class="k">총 응답시간</div><div class="v">${m.total_resp??'—'}<small> s</small></div></div>
        <div class="badge"><div class="k">멀티모달</div><div class="v">${m.radar.multimodal.measured?'측정':'미측정'}</div></div>
      </div>
    </div>`;
}

// ---------- legend ----------
function legendHTML(){
  const lg=$("#legend"),hint=$("#hint");
  if(state.view==="radar"){
    lg.innerHTML=state.selected.map((s,i)=>{const m=MODELS.find(x=>x.slug===s);return m?`<span class="it"><span class="sw" style="background:var(${SERIES[i]})"></span>${m.name}</span>`:'';}).join('')
      +`<span class="it"><span class="sw" style="background:var(--base)"></span>평균(50) 기준선</span>`;
    hint.textContent="축이 기준선 밖 = 평균 이상. 점선 표식 = 측정 안 됨. ⌘+클릭으로 최대 3개 비교.";
  } else {
    lg.innerHTML="";
    hint.textContent="왼쪽 위일수록 가성비 우수(싸고 똑똑). 점 클릭 → 선택. 가격은 로그 축.";
  }
}

// ---------- render ----------
function render(){
  buildList();panelHTML();legendHTML();
  $("#viewwrap").innerHTML = state.view==="radar"?radarSVG():scatterSVG();
  if(state.view==="scatter"){
    $("#viewwrap").querySelectorAll("circle[data-slug]").forEach(c=>c.onclick=e=>toggleSelect(c.getAttribute("data-slug"),e.metaKey||e.ctrlKey||e.shiftKey));
  }
}

// init
$("#meta").innerHTML=`데이터 ${PAYLOAD.scraped_at} · ${MODELS.length}개 모델 · 제작사 화이트리스트`;
$("#footdate").textContent="갱신 "+PAYLOAD.scraped_at;
$("#search").oninput=e=>{state.q=e.target.value.toLowerCase().trim();render();};
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  state.view=t.dataset.view;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));
  render();
});
buildFilters();render();
</script>
