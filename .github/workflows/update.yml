name: site-update

# [임시 테스트] 02:30 UTC = 11:30 KST — 정각(00:00 UTC) 드롭 가설 검증용.
# 검증 후 운영 시각으로 되돌릴 것(예: "17 0 * * *" = 09:17 KST, 정각 회피).
# 스케줄 변경 시 이 cron을 직접 수정 (Actions cron은 항상 UTC).
on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # 스냅샷 커밋
  pages: write      # Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # rebase 재시도용 전체 히스토리

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape leaderboard
        run: node scripts/scrape_aa.mjs

      - name: Build cards + artifact
        run: |
          python3 scripts/build_cards.py
          python3 scripts/build_artifact.py

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp artifact/llm-radar.html site/index.html

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # 변경이 없으면 깔끔히 종료(정상)
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋·푸시 생략"
            exit 0
          fi
          git commit -m "chore: daily data refresh ($(date -u +%F))"
          # 동시 푸시(다른 런·수동 푸시) 대비: 거부되면 rebase 후 재시도(최대 3회).
          # 끝내 실패하면 잡을 실패시켜 가시화한다(과거 'push 생략' silent 무시 제거).
          for i in 1 2 3; do
            if git push; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push 거부 — origin 변경 감지, rebase 후 재시도 ($i)"
            git pull --rebase origin main || { echo "rebase 실패"; exit 1; }
          done
          echo "push 3회 실패"
          exit 1

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
