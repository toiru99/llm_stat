name: site-update

# [임시 테스트] 02:30 UTC = 11:30 KST — 정각(00:00 UTC) 드롭 가설 검증용.
# 검증 후 운영 시각으로 되돌릴 것(예: "17 0 * * *" = 09:17 KST, 정각 회피).
# 스케줄 변경 시 이 cron을 직접 수정 (Actions cron은 항상 UTC).
on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # 스냅샷 커밋
  pages: write      # Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape leaderboard
        run: node scripts/scrape_aa.mjs

      - name: Build cards + artifact
        run: |
          python3 scripts/build_cards.py
          python3 scripts/build_artifact.py

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp artifact/llm-radar.html site/index.html

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: daily data refresh ($(date -u +%F))" || echo "변경 없음"
          git push || echo "push 생략"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
