name: weekly-update

# 매주 일 21:00 UTC = 월 06:00 KST (config.toml [update] 기본값과 일치).
# 스케줄 변경 시 이 cron을 직접 수정 (Actions cron은 항상 UTC).
on:
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write   # 스냅샷 커밋
  pages: write      # Pages 배포
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Playwright
        run: |
          npm install
          npx playwright install --with-deps chromium

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape leaderboard
        run: node scripts/scrape_aa.mjs

      - name: Build cards + artifact
        run: |
          python3 scripts/build_cards.py
          python3 scripts/build_artifact.py

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp artifact/llm-radar.html site/index.html

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: weekly data refresh ($(date -u +%F))" || echo "변경 없음"
          git push || echo "push 생략"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
